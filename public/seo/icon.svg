<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Defs: gradient + shadow -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="vGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square (iOS-style 22% corner radius) -->
  <rect x="0" y="0" width="512" height="512" rx="115" ry="115" fill="url(#bgGrad)"/>

  <!-- Subtle highlight on top -->
  <rect x="0" y="0" width="512" height="220" rx="115" ry="115" fill="white" opacity="0.08"/>

  <!-- Stylized V — bold, modern, slight italic feel -->
  <g filter="url(#softShadow)">
    <path
      d="M 130 130
         L 195 130
         L 256 340
         L 317 130
         L 382 130
         L 290 410
         L 222 410
         Z"
      fill="url(#vGrad)"
      stroke="#ffffff"
      stroke-width="2"
    />
  </g>

  <!-- Cashback coin badge bottom-right corner -->
  <g transform="translate(360, 360)">
    <circle cx="0" cy="0" r="68" fill="url(#coinGrad)" stroke="#ffffff" stroke-width="6"/>
    <text x="0" y="20"
          text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
          font-size="76"
          font-weight="900"
          fill="#9a3412">%</text>
  </g>
</svg>
